name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Dummy key so imports don't fail during tests
      # Real key is never stored in code — set via GitHub Secrets for production
      GEMINI_API_KEY: "dummy-key-for-ci"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-mock
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        # Fail build on real errors: syntax errors, undefined names, bad imports
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Warnings only (line length, complexity) — does NOT fail the build
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics \
          --exclude=__pycache__,.git,.venv,venv

    - name: Run tests with pytest
      run: |
        pytest tests/ -v --tb=short
